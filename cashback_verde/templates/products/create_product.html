{% extends 'base.html' %}

{% block title %}Novo Produto{% endblock %}

{% block content %}
<div class="container" style="max-width: 700px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="text-success mb-1">Cadastrar produto</h2>
            <p class="text-muted mb-0">Adicione um novo item sustentável ao marketplace.</p>
        </div>
        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Voltar</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success">Salvar produto</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
