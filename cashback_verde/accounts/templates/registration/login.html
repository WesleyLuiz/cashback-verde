{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4">Entrar</h2>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <p class="mt-3">
        Não tem conta?
        <a href="{% url 'register' %}">Cadastre-se</a>
    </p>
</div>
{% endblock %}
