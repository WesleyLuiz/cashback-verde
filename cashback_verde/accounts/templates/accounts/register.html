{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4">Criar conta</h2>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Cadastrar</button>
    </form>

    <p class="mt-3">
        Já tem conta?
        <a href="{% url 'login' %}">Entrar</a>
    </p>
</div>
{% endblock %}
